HTML_EXTRA_STYLESHEET   = @CALDERA_DOXYGEN_CSS_DIR@/doxygen-awesome.css
HTML_EXTRA_FILES        = @CALDERA_DOXYGEN_CSS_DIR@/doxygen-awesome-darkmode-toggle.js
HTML_OUTPUT             = ./html
GENERATE_TREEVIEW       = YES

INTERNAL_DOCS           = NO
